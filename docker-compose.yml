# ACETEL IMS: National-Grade Production Stack (SSL Hardened)
# ---------------------------------------------------
# 6-Tier Decoupled Infrastructure with Automated SSL & Network Isolation

services:
  # 1. Institutional Gateway (Public Entry Point - SSL Terminated)
  nginx:
    image: nginx:alpine
    container_name: acetel-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot-data:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_net
    restart: on-failure

  # 2. Automated SSL Renewal (Certbot Sidecar)
  certbot:
    image: certbot/certbot
    container_name: acetel-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot-data:/var/www/certbot
    # Daily renewal check
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - frontend_net

  # 3. Frontend (SPA Consumer)
  frontend:
    build: ./client
    container_name: acetel-frontend
    networks:
      - frontend_net
    restart: on-failure

  # 4. Backend (API Provider)
  backend:
    build: ./server
    container_name: acetel-backend
    environment:
      - MONGODB_URI=mongodb://${DB_USER}:${DB_PASS}@mongodb:27017/${DB_NAME}?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=5000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    restart: on-failure

  # 5. Database (Strictly Isolated)
  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASS}
    # NO PORTS EXPOSED - Security Hardening
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_net
    restart: on-failure

  # 6. Backup Sidecar (Data Integrity)
  backups:
    image: mongo:latest
    container_name: acetel-backups
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./infra/backups:/scripts
      - mongo-backups:/backup/archive
    entrypoint: ["/bin/sh", "-c", "chmod +x /scripts/backup_task.sh && while true; do /scripts/backup_task.sh; sleep 86400; done"]
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend_net
    restart: on-failure

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  mongo-data:
  mongo-backups:
  certbot-etc:
  certbot-var:
  webroot-data:
