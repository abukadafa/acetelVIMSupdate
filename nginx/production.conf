# ACETEL IMS: "National-Grade" SSL Gateway Configuration
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Gzip Compression for Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Institutional Gateway - Port 80 (Redirect to HTTPS)
    server {
        listen 80;
        server_name YOUR_DOMAIN; # Replace with ims.acetel.edu.ng

        # Let's Encrypt Certbot Challenge Path (Required for Renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Global Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Institutional Gateway - Port 443 (Secure HTTPS)
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN; # Replace with ims.acetel.edu.ng

        # SSL Certificate Paths (Managed by Certbot Sidecar)
        ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # "A+ Grade" SSL Hardening (TLS 1.2, 1.3)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        
        # HSTS (HTTP Strict Transport Security) - Mandatory for Institutions
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Shared Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Frontend SPA Routing
        location / {
            proxy_pass http://frontend:80;
        }

        # API Proxying
        location /api {
            proxy_pass http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # Socket.io Support
        location /socket.io {
            proxy_pass http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
